services:
  http-proxy-reverse:
    build:
      context: ./apps/http-proxy-reverse
      dockerfile: Dockerfile
    container_name: http-proxy-reverse
    restart: unless-stopped
    environment:
      - PROXY_DOMAIN=${PROXY_DOMAIN:-localhost}
      - PROXY_PORT=4000
      - API_DOMAIN=${API_DOMAIN:-localhost}
      - API_PORT=4001
      - DB_FILE_NAME=/data/db.sqlite
    networks:
      - proxy_network
    volumes:
      - proxy_data:/data

  web-app:
    build:
      context: ./apps/web-app
      dockerfile: Dockerfile
    container_name: web-app
    restart: unless-stopped
    environment:
      - PROXY_API_URL=http://http-proxy-reverse:4001
    networks:
      - proxy_network
    depends_on:
      - http-proxy-reverse

networks:
  proxy_network:
    driver: bridge

volumes:
  proxy_data:
